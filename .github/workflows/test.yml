name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests with coverage
        id: cov
        uses: ./.github/actions/run-coverage

      - name: Print coverage summary
        if: always() && steps.cov.outputs.has-report == 'true'
        run: |
          PCT="${{ steps.cov.outputs.pct }}"
          echo "Instruction coverage: ${PCT}%"
          {
            echo "### Coverage: ${PCT}%"
            echo ""
            echo "Download the **coverage-report** artifact from the run summary and open \`index.html\` to drill into per-class / per-line coverage."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

  coverage-check:
    name: Coverage check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout head
        uses: actions/checkout@v4
        with:
          path: head

      - name: Compute base coverage
        id: base
        uses: ./head/.github/actions/run-coverage
        with:
          working-directory: base
          script-path: ../head/.github/scripts/jacoco_coverage.py
          skip-if-no-jacoco: 'true'

      - name: Upload base coverage report
        if: always() && steps.base.outputs.has-report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-base
          path: base/build/reports/jacoco/test
          if-no-files-found: ignore

      - name: Compute head coverage
        id: head
        uses: ./head/.github/actions/run-coverage
        with:
          working-directory: head

      - name: Upload head coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-head
          path: head/build/reports/jacoco/test
          if-no-files-found: ignore

      - name: Compare coverage
        run: |
          BASE="${{ steps.base.outputs.pct }}"
          HEAD="${{ steps.head.outputs.pct }}"
          echo "Base coverage: ${BASE}%"
          echo "Head coverage: ${HEAD}%"
          {
            echo "### Coverage diff"
            echo ""
            echo "| Branch | Coverage |"
            echo "|--------|----------|"
            echo "| base   | ${BASE}% |"
            echo "| head   | ${HEAD}% |"
            echo ""
            echo "Download **coverage-report-base** and **coverage-report-head** artifacts from this run to compare per-class / per-line coverage and find regressions."
          } >> "$GITHUB_STEP_SUMMARY"
          python3 - <<PY
          base = float("$BASE")
          head = float("$HEAD")
          if head + 1e-9 < base:
              print(f"::error::Coverage decreased: {base}% -> {head}%")
              raise SystemExit(1)
          print(f"OK: coverage {base}% -> {head}%")
          PY
