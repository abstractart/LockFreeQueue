name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f build/reports/jacoco/test/jacocoTestReport.xml ]; then
            PCT=$(python3 .github/scripts/jacoco_coverage.py build/reports/jacoco/test/jacocoTestReport.xml)
            echo "Instruction coverage: ${PCT}%"
            {
              echo "### Coverage: ${PCT}%"
              echo ""
              echo "Download the **coverage-report** artifact from the run summary and open \`index.html\` to drill into per-class / per-line coverage."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

  coverage-check:
    name: Coverage check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout head
        uses: actions/checkout@v4
        with:
          path: head

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute base coverage
        id: base
        working-directory: base
        run: |
          chmod +x ./gradlew
          if [ ! -f build.gradle ] || ! grep -q jacoco build.gradle; then
            echo "Base lacks JaCoCo — treating base coverage as 0%."
            echo "pct=0" >> "$GITHUB_OUTPUT"
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ./gradlew test jacocoTestReport --no-daemon
          PCT=$(python3 ../head/.github/scripts/jacoco_coverage.py build/reports/jacoco/test/jacocoTestReport.xml)
          echo "Base coverage: ${PCT}%"
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "has_report=true" >> "$GITHUB_OUTPUT"

      - name: Upload base coverage report
        if: always() && steps.base.outputs.has_report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-base
          path: base/build/reports/jacoco/test
          if-no-files-found: ignore

      - name: Compute head coverage
        id: head
        working-directory: head
        run: |
          chmod +x ./gradlew
          ./gradlew test jacocoTestReport --no-daemon
          PCT=$(python3 .github/scripts/jacoco_coverage.py build/reports/jacoco/test/jacocoTestReport.xml)
          echo "Head coverage: ${PCT}%"
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"

      - name: Upload head coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-head
          path: head/build/reports/jacoco/test
          if-no-files-found: ignore

      - name: Compare coverage
        run: |
          BASE="${{ steps.base.outputs.pct }}"
          HEAD="${{ steps.head.outputs.pct }}"
          echo "Base coverage: ${BASE}%"
          echo "Head coverage: ${HEAD}%"
          {
            echo "### Coverage diff"
            echo ""
            echo "| Branch | Coverage |"
            echo "|--------|----------|"
            echo "| base   | ${BASE}% |"
            echo "| head   | ${HEAD}% |"
            echo ""
            echo "Download **coverage-report-base** and **coverage-report-head** artifacts from this run to compare per-class / per-line coverage and find regressions."
          } >> "$GITHUB_STEP_SUMMARY"
          python3 - <<PY
          base = float("$BASE")
          head = float("$HEAD")
          if head + 1e-9 < base:
              print(f"::error::Coverage decreased: {base}% -> {head}%")
              raise SystemExit(1)
          print(f"OK: coverage {base}% -> {head}%")
          PY
