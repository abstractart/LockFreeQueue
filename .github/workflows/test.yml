name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    outputs:
      pct: ${{ steps.cov.outputs.pct }}
      has-report: ${{ steps.cov.outputs.has-report }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests with coverage
        id: cov
        uses: ./.github/actions/run-coverage
        with:
          quick: ${{ github.event_name == 'pull_request' }}

      - name: Print coverage summary
        if: always() && steps.cov.outputs.has-report == 'true'
        run: |
          PCT="${{ steps.cov.outputs.pct }}"
          echo "Instruction coverage: ${PCT}%"
          {
            echo "### Coverage: ${PCT}%"
            echo ""
            echo "Download the **coverage-report** artifact from the run summary and open \`index.html\` to drill into per-class / per-line coverage."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write coverage pct file
        if: steps.cov.outputs.has-report == 'true'
        run: echo "${{ steps.cov.outputs.pct }}" > coverage-pct.txt

      - name: Upload coverage pct (consumed by Coverage check on PRs)
        if: steps.cov.outputs.has-report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-pct
          path: coverage-pct.txt
          retention-days: 90

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

  coverage-check:
    name: Coverage check
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Fetch baseline coverage from latest successful main run
        id: base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list \
            --branch main \
            --workflow Tests \
            --status success \
            --limit 1 \
            --repo "${{ github.repository }}" \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::warning::No successful main run found — skipping coverage gate."
            echo "pct=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p base-cov
          if ! gh run download "$RUN_ID" \
              --name coverage-pct \
              --dir base-cov \
              --repo "${{ github.repository }}"; then
            echo "::warning::No coverage-pct artifact on main run $RUN_ID — skipping gate."
            echo "pct=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_PCT=$(tr -d '[:space:]' < base-cov/coverage-pct.txt)
          echo "Baseline (main run $RUN_ID): ${BASE_PCT}%"
          echo "pct=$BASE_PCT" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Compare coverage
        env:
          BASE: ${{ steps.base.outputs.pct }}
          HEAD: ${{ needs.test.outputs.pct }}
          BASE_RUN: ${{ steps.base.outputs.run_id }}
        run: |
          set -euo pipefail
          if [ -z "$BASE" ]; then
            {
              echo "### Coverage gate"
              echo ""
              echo "Baseline coverage from main is not yet available — gate skipped."
              echo ""
              echo "Head coverage: ${HEAD}%"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Baseline unavailable — gate skipped (head was ${HEAD}%)."
            exit 0
          fi
          echo "Base coverage: ${BASE}% (from main run ${BASE_RUN})"
          echo "Head coverage: ${HEAD}%"
          {
            echo "### Coverage diff"
            echo ""
            echo "| Branch | Coverage |"
            echo "|--------|----------|"
            echo "| base (main run [${BASE_RUN}](../../actions/runs/${BASE_RUN})) | ${BASE}% |"
            echo "| head | ${HEAD}% |"
            echo ""
            echo "Baseline comes from the most recent successful Tests run on main — no re-build needed."
          } >> "$GITHUB_STEP_SUMMARY"
          python3 - <<PY
          base = float("$BASE")
          head = float("$HEAD")
          if head + 1e-9 < base:
              print(f"::error::Coverage decreased: {base}% -> {head}%")
              raise SystemExit(1)
          print(f"OK: coverage {base}% -> {head}%")
          PY
