plugins {
    id 'java'
    id 'jacoco'
    id 'me.champeau.jmh' version '0.7.3'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.jetbrains.lincheck:lincheck:3.6'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

jacoco {
    toolVersion = '0.8.13'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
    jvmArgs(
        '--add-opens=java.base/jdk.internal.misc=ALL-UNNAMED',
        '--add-opens=java.base/java.lang=ALL-UNNAMED',
        '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
        '--add-opens=java.base/java.util=ALL-UNNAMED',
        '--add-opens=java.base/jdk.internal.access=ALL-UNNAMED',
        '--add-exports=java.base/jdk.internal.util=ALL-UNNAMED',
        '--add-exports=java.base/sun.security.action=ALL-UNNAMED'
    )
    if (project.hasProperty('quick')) {
        systemProperty 'lincheck.quick', 'true'
    }
}

jmh {
    // Defaults MIRROR the @Fork/@Warmup/@Measurement annotations on the
    // benchmark classes (fork=2, warmup 3x2s, measurement 5x2s) — this block
    // overrides those annotations, so keeping them in sync means the numbers
    // in the source read true. Two forks matter for SampleTime tail stats
    // (p0.99/p0.999): a single fork can't separate real tail from JIT/GC noise.
    // Override per-run from the CLI for a quick smoke run:
    //   ./gradlew jmh -Pjmh.include=StackContentionBenchmark
    //   ./gradlew jmh -Pjmh.fork=1 -Pjmh.iterations=3 -Pjmh.warmupIterations=2 -Pjmh.time=1s -Pjmh.warmup=500ms
    // JVM flags tuned to take GC off the critical path so it stops polluting the
    // latency tail (a stop-the-world pause once produced a 1.77 s SampleTime max):
    //   -Xms3g -Xmx3g       fixed heap — no resize pauses mid-run.
    //   -XX:+AlwaysPreTouch commit + fault in all pages up front — no first-touch
    //                       page-fault jitter on the early measured iterations.
    //   -XX:+UseZGC -XX:+ZGenerational   generational ZGC: concurrent, sub-ms
    //                       pauses, so per-push node allocation no longer stalls
    //                       a spinning thread with a multi-ms STW. (ZGenerational
    //                       is explicit on the JDK 21 toolchain; it is the default
    //                       from JDK 23.) Absolute throughput shifts vs the old G1
    //                       runs — numbers are not 1:1 comparable to pre-ZGC reports.
    // 3 GB still covers StackAsymmetricBenchmark growing the stack over a 2 s
    // iteration; iteration @Setup resets state.
    jvmArgs = ['-Xms3g', '-Xmx3g', '-XX:+AlwaysPreTouch', '-XX:+UseZGC', '-XX:+ZGenerational']
    fork = (project.findProperty('jmh.fork') ?: '2') as Integer
    warmupIterations = (project.findProperty('jmh.warmupIterations') ?: '3') as Integer
    iterations = (project.findProperty('jmh.iterations') ?: '5') as Integer
    timeOnIteration = project.findProperty('jmh.time') ?: '2s'
    warmup = project.findProperty('jmh.warmup') ?: '2s'
    if (project.hasProperty('jmh.threads')) {
        threads = (project.property('jmh.threads')) as Integer
    }
    resultFormat = 'JSON'
    profilers = ['gc']
    if (project.hasProperty('jmh.include')) {
        includes = [project.property('jmh.include')]
    }
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
    classDirectories.setFrom(
        files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                'org/example/Main.class',
                'org/example/Main$*.class'
            ])
        })
    )
}